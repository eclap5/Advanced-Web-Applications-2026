<!--
This is a simple HTML file to test CORS functionality. It attempts to fetch data from the API server running on localhost:4000 and displays the result or any error message in the page.

NOTE: This must be executed with another web server (i.e. LiveServer extension in VSCode) to properly test CORS from different origins.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>CORS Test</h1>
    <p>This is a simple test page for CORS functionality.</p>
    <div id="result">

    </div>
</body>
</html>

<script>
    async function fetchData() {
        try {
            const response = await fetch("http://localhost:8000/api/debug/config");
            const data = await response.json();
            document.getElementById("result").textContent = JSON.stringify(data);
        } catch (err) {
            document.getElementById("result").textContent = "Error: " + err.message;
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        fetchData();
    });
</script>
